<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SnapStak</title>
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
        body{width:300px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#111;color:#e8e8e8;font-size:13px;}
        .header{display:flex;align-items:center;justify-content:space-between;padding:13px 15px;border-bottom:1px solid #1e1e1e;background:#1a1a1a;}
        .logo{font-size:15px;font-weight:500;color:#fff;}.logo em{color:#38a3f8;font-style:normal;}
        .status{display:flex;align-items:center;gap:5px;font-size:11px;color:#555;}
        .dot{width:6px;height:6px;border-radius:50%;background:#333;}
        .dot.on{background:#4f8;box-shadow:0 0 4px #4f8;}.dot.off{background:#e55;}
        .body{padding:14px;display:flex;flex-direction:column;gap:10px;}
        .url{font-size:10px;color:#444;font-family:monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
        .btn{width:100%;padding:9px;border-radius:7px;border:none;font-size:12px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:all .15s;}
        .btn:disabled{opacity:.35;cursor:not-allowed;}
        .btn-p{background:#38a3f8;color:#000;}.btn-p:hover:not(:disabled){background:#5ab5fa;}
        .btn-s{background:#1e1e1e;color:#888;border:0.5px solid #2a2a2a;}.btn-s:hover:not(:disabled){border-color:#38a3f8;color:#fff;}
        .spinner{display:none;width:12px;height:12px;border:2px solid rgba(0,0,0,.2);border-top-color:#000;border-radius:50%;animation:sp .7s linear infinite;}
        @keyframes sp{to{transform:rotate(360deg);}}
        .spinning .spinner{display:inline-block;}.spinning .btn-lbl{display:none;}
        .notice{padding:9px 11px;border-radius:6px;font-size:11px;line-height:1.5;}
        .n-warn{background:#1a130a;border:0.5px solid #443300;color:#ca8;}
        .n-ok  {background:#0a140a;border:0.5px solid #1a3a1a;color:#4f8;}
        .n-err {background:#1a0a0a;border:0.5px solid #440000;color:#f88;}
        .open-app{font-size:11px;color:#38a3f8;text-align:center;cursor:pointer;text-decoration:none;display:block;padding:3px 0;}
        .open-app:hover{color:#5ab5fa;}
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">Snap<em>Stak</em></div>
        <div class="status">
            <div class="dot" id="dot"></div>
            <span id="statusLabel">checking…</span>
        </div>
    </div>
    <div class="body">
        <div class="url" id="pageUrl">—</div>
        <div id="noticeArea"></div>
        <button class="btn btn-p" id="btnDeconstruct" disabled>
            <span class="spinner"></span>
            <span class="btn-lbl">
                <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><path d="M7 1L2 4v3l5 3 5-3V4L7 1z" stroke="black" stroke-width="1.3" stroke-linejoin="round"/><path d="M2 4l5 3 5-3" stroke="black" stroke-width="1.3"/><path d="M7 7v6" stroke="black" stroke-width="1.3"/></svg>
                Deconstruct this page
            </span>
        </button>
        <button class="btn btn-s" id="btnSelect" disabled>
            <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><rect x="1" y="1" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.3"/><rect x="8" y="1" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.3"/><rect x="1" y="8" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.3"/><rect x="8" y="8" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.3"/></svg>
            Select component
        </button>
        <a class="open-app" href="http://localhost:5174" target="_blank">Open CON10X engine ↗</a>
    </div>
    <script src="popup.js"></script>
</body>
</html>
